<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#04060d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CH Geladas">
<title>Venda Avulsa — CH Geladas</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background:#04060d; color:#f1f5f9; font-family:'DM Sans',sans-serif; min-height:100vh; margin:0; }

/* ── LOCK ── */
#lock { position:fixed; inset:0; background:linear-gradient(135deg,#04060d 0%,#0c1220 100%); display:flex; align-items:center; justify-content:center; z-index:100; }
.lock-card { background:rgba(15,23,42,.9); border:1px solid rgba(255,255,255,.08); border-radius:2rem; padding:2.5rem 2rem; width:min(90vw,360px); box-shadow:0 32px 80px rgba(0,0,0,.6); backdrop-filter:blur(20px); }
.lock-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; color:#fff; margin:0 0 .25rem; }
.login-input { font-size:1rem; font-family:'DM Sans',sans-serif; background:rgba(255,255,255,.03); border:2px solid rgba(255,255,255,.08); border-radius:1.25rem; color:#fff; padding:1rem 1.25rem; width:100%; text-align:left; outline:none; transition:all .2s; box-sizing:border-box; margin-bottom:.75rem; }
.login-input::placeholder { color:#475569; }
.login-input:focus { border-color:rgba(167,139,250,.6); background:rgba(167,139,250,.05); box-shadow:0 0 0 4px rgba(167,139,250,.12); }

/* ── APP ── */
#app { display:none; min-height:100vh; }
.header { position:sticky; top:0; z-index:50; background:rgba(4,6,13,.9); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:.75rem; padding:.875rem 1rem; }
.header-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:#fff; flex:1; }
.role-pill { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; padding:.2rem .6rem; border-radius:999px; background:rgba(167,139,250,.15); color:#a78bfa; }

/* ── FORM ── */
.page-wrap { padding:1rem 1rem 6rem; max-width:480px; margin:0 auto; }
.card { background:rgba(12,16,26,.9); border:1px solid rgba(255,255,255,.07); border-radius:1.25rem; padding:1.25rem; margin-bottom:.875rem; }
.card-title { font-family:'Syne',sans-serif; font-weight:800; font-size:.82rem; text-transform:uppercase; letter-spacing:.07em; color:#a78bfa; margin-bottom:1.1rem; display:flex; align-items:center; gap:.5rem; }
.field-label { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#64748b; margin-bottom:.35rem; display:block; }
.field-input { width:100%; background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08); border-radius:.75rem; color:#f1f5f9; font-size:1rem; padding:.75rem 1rem; outline:none; font-family:'DM Sans',sans-serif; transition:.2s; margin-bottom:.875rem; }
.field-input:focus { border-color:rgba(167,139,250,.5); background:rgba(167,139,250,.05); }
.valor-grande { font-size:2rem !important; font-family:'Syne',sans-serif !important; font-weight:800 !important; text-align:center; color:#a78bfa !important; }
.pgto-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.875rem; }
.pgto-btn { padding:.7rem; border-radius:.75rem; font-size:.72rem; font-weight:700; text-align:center; cursor:pointer; border:1.5px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03); color:#64748b; transition:.2s; user-select:none; }
.pgto-btn.sel { border-color:rgba(167,139,250,.5); background:rgba(167,139,250,.12); color:#a78bfa; }
.recebido-wrap { display:none; }
.recebido-wrap.show { display:block; }
.troco-box { text-align:center; font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; padding:.6rem; border-radius:.75rem; margin:.25rem 0 .875rem; }
.troco-pos { color:#34d399; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.15); }
.troco-neg { color:#f87171; background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.15); }
.btn-registrar { width:100%; padding:1.1rem; border-radius:1rem; font-family:'Syne',sans-serif; font-weight:800; font-size:.95rem; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; border:none; background:linear-gradient(135deg,#7c3aed,#6d28d9); color:#fff; box-shadow:0 8px 24px rgba(124,58,237,.3); transition:.2s; }
.btn-registrar:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }
.btn-registrar:not(:disabled):active { transform:scale(.98); }

/* ── HISTÓRICO ── */
.hist-item { display:flex; align-items:center; gap:.75rem; padding:.55rem 0; border-bottom:1px solid rgba(255,255,255,.05); }
.hist-item:last-child { border-bottom:none; }
.hist-icon { width:2rem; height:2rem; border-radius:.5rem; background:rgba(167,139,250,.12); color:#a78bfa; display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; }
.hist-desc { flex:1; }
.hist-nome { font-size:.8rem; font-weight:600; color:#e2e8f0; }
.hist-sub  { font-size:.62rem; color:#64748b; margin-top:.1rem; }
.hist-val  { font-family:'Syne',sans-serif; font-weight:800; font-size:.9rem; color:#a78bfa; white-space:nowrap; }
.hist-pill { font-size:.58rem; font-weight:700; padding:.1rem .4rem; border-radius:999px; background:rgba(167,139,250,.1); color:#a78bfa; }
.hist-vazio { text-align:center; padding:2rem 1rem; color:#475569; font-size:.78rem; }
.total-dia-row { display:flex; justify-content:space-between; align-items:center; padding:.65rem 0 0; border-top:1px solid rgba(255,255,255,.07); margin-top:.375rem; }
.total-dia-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.06em; color:#64748b; }
.total-dia-val   { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:#a78bfa; }

/* ── TOAST ── */
#toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(100px); background:#1e293b; color:#f1f5f9; font-size:.8rem; font-weight:700; padding:.7rem 1.25rem; border-radius:999px; box-shadow:0 8px 32px rgba(0,0,0,.4); transition:.3s; opacity:0; z-index:999; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.ok  { background:#064e3b; color:#34d399; }
#toast.err { background:#450a0a; color:#f87171; }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-card">
    <div style="font-size:2.5rem;margin-bottom:.75rem">💜</div>
    <p class="lock-logo">Venda Avulsa</p>
    <p style="font-size:.65rem;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin:.25rem 0 1.75rem">CH Geladas</p>
    <input type="text"     id="loginNome"  class="login-input" placeholder="👤 Usuário" autocomplete="username">
    <input type="password" id="loginSenha" class="login-input" placeholder="🔒 Senha"   autocomplete="current-password">
    <div id="lockError" style="font-size:.7rem;color:#f87171;font-weight:700;min-height:1.1rem;margin:.25rem 0 .5rem"></div>
    <button onclick="doLogin()" style="width:100%;padding:1rem;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:1.25rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 24px rgba(124,58,237,.3)">
      Entrar
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <a href="index.html" style="color:#64748b;font-size:1.1rem;line-height:1"><i class="fas fa-chevron-left"></i></a>
    <div class="header-title">💜 Venda Avulsa</div>
    <span id="roleTag" class="role-pill"></span>
    <button onclick="logout()" style="color:#475569;font-size:.8rem;background:none;border:none;cursor:pointer;padding:.25rem"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <div class="page-wrap">

    <!-- Formulário -->
    <div class="card">
      <div class="card-title"><i class="fas fa-plus-circle"></i> Nova Venda</div>

      <label class="field-label">Descrição</label>
      <input type="text" id="avDesc" class="field-input"
        placeholder="Ex: Serviço, produto, comissão…"
        oninput="validarForm()">

      <label class="field-label">Valor (R$)</label>
      <input type="number" id="avValor" class="field-input valor-grande"
        placeholder="0,00" min="0" step="0.01"
        oninput="validarForm(); calcTroco()">

      <label class="field-label">Forma de Pagamento</label>
      <div class="pgto-grid">
        <div class="pgto-btn sel" onclick="selPgto(this,'Dinheiro')">💵 Dinheiro</div>
        <div class="pgto-btn"    onclick="selPgto(this,'PIX')">⚡ PIX</div>
        <div class="pgto-btn"    onclick="selPgto(this,'Cartão Débito')">💳 Débito</div>
        <div class="pgto-btn"    onclick="selPgto(this,'Cartão Crédito')">💳 Crédito</div>
      </div>

      <div class="recebido-wrap" id="recebidoWrap">
        <label class="field-label">Valor Recebido (R$)</label>
        <input type="number" id="avRecebido" class="field-input"
          placeholder="0,00" min="0" step="0.01"
          oninput="calcTroco()">
        <div id="trocoBox" style="display:none" class="troco-box"></div>
      </div>

      <button id="btnRegistrar" class="btn-registrar" onclick="registrar()" disabled>
        <i class="fas fa-check mr-2"></i> Registrar Venda
      </button>
    </div>

    <!-- Histórico do dia -->
    <div class="card">
      <div class="card-title"><i class="fas fa-list-ul"></i> Hoje</div>
      <div id="historico"><div class="hist-vazio">Nenhuma venda avulsa hoje.</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="core.js"></script>
<script src="./services/permissoesService.js"></script>
<script src="./services/userService.js"></script>
<script src="./services/syncService.js"></script>
<script src="./services/auditService.js"></script>
<script src="./services/syncMonitor.js"></script>
<script src="./services/backupService.js"></script>
<script src="./services/estoqueService.js"></script>
<script src="./services/financeiroService.js"></script>
<script src="./services/vendasService.js"></script>
<script>
'use strict';
// Aliases seguros — só acessados dentro das funções (não no topo do script)
function _Store()  { return window.CH && window.CH.Store;       }
function _Auth()   { return window.CH && window.CH.AuthService; }
function _Utils()  { return window.CH && window.CH.Utils;       }
function _Bus()    { return window.CH && window.CH.EventBus;    }

/* ── LOGIN ── */
async function doLogin() {
  const nome  = document.getElementById('loginNome').value.trim();
  const senha = document.getElementById('loginSenha').value.trim();
  const err   = document.getElementById('lockError');
  err.textContent = '';
  if (!nome || !senha) { err.textContent = 'Preencha usuário e senha.'; return; }

  let ok = false;
  if (window.CH?.UserService) {
    const user = await window.CH.UserService.login(nome, senha);
    ok = !!user;
  } else {
    ok = !!(_Auth() && await _Auth().login(senha));
  }

  if (ok) {
    const role = _Auth().getRole();
    // Bloqueia roles sem acesso a vendas
    const PODE = ['adm','admin','gerente','operador','pdv','colaborador'];
    const Perm = window.CH.PermissoesService;
    const temVendas = PODE.includes(role) || (Perm && Perm.temAcesso(role,'vendas'));
    if (!temVendas) {
      _Auth() && _Auth().logout();
      err.textContent = 'Seu perfil não tem acesso a vendas.';
      return;
    }
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    init();
  } else {
    err.textContent = 'Usuário ou senha incorretos.';
    document.getElementById('loginSenha').value = '';
    document.getElementById('loginSenha').focus();
  }
}

document.getElementById('loginSenha').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('loginNome').addEventListener('keydown',  e => { if (e.key==='Enter') document.getElementById('loginSenha').focus(); });

function logout() { if (!confirm('Encerrar sessão?')) return; _Auth() && _Auth().logout(); location.reload(); }

/* ── INIT ── */
function init() {
  if (!window.CH) { console.error('[Avulsa] window.CH não disponível'); return; }
  const role = _Auth().getRole();
  const Perm = window.CH.PermissoesService;
  const info = Perm?.getPerfil(role) || {};
  const roleEl = document.getElementById('roleTag');
  if (roleEl) { roleEl.textContent = info.label || role; roleEl.style.color = info.cor || '#a78bfa'; roleEl.style.background = (info.cor||'#a78bfa')+'22'; }

  window.CH.FirebaseService?.init().then(() => {
    window.CH.FirebaseService?.subscribeRealtime();
    setTimeout(() => window.CH.SyncService?.pull(), 500);
  });

  _Bus() && _Bus().on('store:updated', renderHistorico);
  renderHistorico();
}

/* ── FORM ── */
let _pgto = 'Dinheiro';

function selPgto(btn, forma) {
  _pgto = forma;
  document.querySelectorAll('.pgto-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('recebidoWrap').classList.toggle('show', forma === 'Dinheiro');
  document.getElementById('trocoBox').style.display = 'none';
}

function calcTroco() {
  if (_pgto !== 'Dinheiro') return;
  const val = parseFloat(document.getElementById('avValor').value) || 0;
  const rec = parseFloat(document.getElementById('avRecebido').value) || 0;
  const box = document.getElementById('trocoBox');
  if (!val || !rec) { box.style.display = 'none'; return; }
  const troco = rec - val;
  box.style.display = 'block';
  box.className = 'troco-box ' + (troco >= 0 ? 'troco-pos' : 'troco-neg');
  box.textContent = troco >= 0
    ? 'Troco: ' + fmt(troco)
    : 'Falta: ' + fmt(Math.abs(troco));
}

function validarForm() {
  const desc  = document.getElementById('avDesc').value.trim();
  const valor = parseFloat(document.getElementById('avValor').value) || 0;
  document.getElementById('btnRegistrar').disabled = !(desc && valor > 0);
}

function registrar() {
  if (!window.CH) return;
  const desc  = document.getElementById('avDesc').value.trim();
  const valor = parseFloat(document.getElementById('avValor').value) || 0;
  const rec   = parseFloat(document.getElementById('avRecebido').value) || 0;
  if (!desc || !valor) return;

  const troco = _pgto === 'Dinheiro' && rec > 0 ? rec - valor : 0;

  const venda = {
    id:        _Utils().generateId(),
    dataCurta: _Utils().todayISO(),
    data:      _Utils().today(),
    hora:      _Utils().nowTime(),
    criadoEm:  _Utils().nowISO(),
    itens:     [{ prodId:'avulso', nome:desc, qtd:1, preco:valor, custo:0, label:'UNID' }],
    total:     valor,
    subtotal:  valor,
    desconto:  0,
    lucro:     valor,
    formaPgto: _pgto,
    origem:    'avulsa',
    operador:  _Auth().getNome(),
    role:      _Auth().getRole(),
    status:    'concluida',
    _fbSynced: false,
    _troco:    troco,
    _avulsa:   true,
    descricao: desc,
  };

  _Store().mutateVendas(v => { v.unshift(venda); });
  if (window.CH && window.CH.SyncQueue) window.CH.SyncQueue.enqueue('salvar', 'vendas', [venda]);
  if (window.CH && window.CH.FinanceiroService) window.CH.FinanceiroService.registrarReceita?.(venda);
  _Bus() && _Bus().emit('venda:finalizada', venda);

  // Limpa form
  document.getElementById('avDesc').value    = '';
  document.getElementById('avValor').value   = '';
  document.getElementById('avRecebido').value = '';
  document.getElementById('trocoBox').style.display = 'none';
  document.getElementById('recebidoWrap').classList.remove('show');
  document.querySelectorAll('.pgto-btn').forEach((b,i) => b.classList.toggle('sel', i===0));
  _pgto = 'Dinheiro';
  validarForm();
  renderHistorico();
  toast('Venda registrada!', 'ok');
}

/* ── HISTÓRICO ── */
function renderHistorico() {
  if (!window.CH || !window.CH.Store) return;
  const hoje   = _Utils().todayISO();
  const vendas = (_Store().getVendas() || [])
    .filter(v => v._avulsa && v.dataCurta === hoje)
    .slice(0, 30);

  const el = document.getElementById('historico');

  if (!vendas.length) {
    el.innerHTML = '<div class="hist-vazio">Nenhuma venda avulsa hoje.</div>';
    return;
  }

  const totalDia = vendas.reduce((s, v) => s + (v.total || 0), 0);

  el.innerHTML =
    vendas.map(v => `
      <div class="hist-item">
        <div class="hist-icon"><i class="fas fa-tag"></i></div>
        <div class="hist-desc">
          <div class="hist-nome">${v.descricao || v.itens?.[0]?.nome || '—'}</div>
          <div class="hist-sub">${v.hora} · ${v.operador} · <span class="hist-pill">${v.formaPgto}</span></div>
        </div>
        <div class="hist-val">${fmt(v.total)}</div>
      </div>`).join('') +
    `<div class="total-dia-row">
      <span class="total-dia-label">Total do dia</span>
      <span class="total-dia-val">${fmt(totalDia)}</span>
    </div>`;
}

/* ── UTILS ── */
function fmt(v) { return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

function toast(msg, tipo='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + tipo;
  setTimeout(() => { t.className = ''; }, 2500);
}

// Verifica sessão ao carregar
window.addEventListener('DOMContentLoaded', () => {
  if (_Auth() && _Auth().isLogged()) {
    const role = _Auth().getRole();
    const PODE = ['adm','admin','gerente','operador','pdv','colaborador'];
    const Perm = window.CH.PermissoesService;
    if (PODE.includes(role) || (Perm && Perm.temAcesso(role,'vendas'))) {
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display  = 'block';
      init();
    }
  }
  document.getElementById('loginNome')?.focus();
});
</script>
</body>
</html>
