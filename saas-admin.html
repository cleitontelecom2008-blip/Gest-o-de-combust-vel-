<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#04060d">
<title>SaaS Admin — CH Geladas</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#04060d; color:#f1f5f9; font-family:'DM Sans',sans-serif; min-height:100vh; margin:0; }

/* LOCK */
#lock { position:fixed; inset:0; background:linear-gradient(135deg,#04060d,#0c1220); display:flex; align-items:center; justify-content:center; z-index:100; }
.lock-card { background:rgba(15,23,42,.95); border:1px solid rgba(255,255,255,.08); border-radius:2rem; padding:2.5rem 2rem; width:min(90vw,360px); }
.lock-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; }
.inp { width:100%; background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08); border-radius:.75rem; color:#f1f5f9; font-size:.95rem; padding:.75rem 1rem; outline:none; font-family:'DM Sans',sans-serif; margin-bottom:.75rem; }
.inp:focus { border-color:rgba(239,68,68,.5); }

/* HEADER */
.header { position:sticky; top:0; z-index:50; background:rgba(4,6,13,.9); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:1rem; padding:.875rem 1rem; }
.header-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; flex:1; }
.badge-total { font-size:.65rem; font-weight:800; padding:.2rem .6rem; border-radius:999px; background:rgba(239,68,68,.15); color:#f87171; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.625rem; padding:1rem; }
.stat-card { background:rgba(12,16,26,.9); border:1px solid rgba(255,255,255,.07); border-radius:1rem; padding:.875rem; text-align:center; }
.stat-val  { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; }
.stat-lbl  { font-size:.6rem; text-transform:uppercase; letter-spacing:.07em; color:#64748b; margin-top:.15rem; }

/* FILTROS */
.filtros { display:flex; gap:.375rem; padding:0 1rem .75rem; overflow-x:auto; }
.filtro-btn { flex-shrink:0; padding:.35rem .875rem; border-radius:999px; font-size:.68rem; font-weight:700; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03); color:#64748b; cursor:pointer; white-space:nowrap; transition:.2s; }
.filtro-btn.on { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3); color:#f87171; }

/* EMPRESA CARD */
.empresa-card { margin:.375rem 1rem; background:rgba(12,16,26,.9); border:1px solid rgba(255,255,255,.07); border-radius:1rem; overflow:hidden; }
.empresa-header { display:flex; align-items:center; justify-content:space-between; padding:.75rem 1rem; cursor:pointer; }
.empresa-nome { font-family:'Syne',sans-serif; font-weight:800; font-size:.88rem; }
.empresa-id   { font-size:.58rem; color:#475569; font-family:monospace; margin-top:.15rem; }
.empresa-body { padding:.75rem 1rem; border-top:1px solid rgba(255,255,255,.05); }

/* plano select */
.plano-sel { background:#0f172a; border:1px solid rgba(255,255,255,.08); border-radius:.5rem; color:#e2e8f0; font-size:.75rem; padding:.35rem .625rem; outline:none; cursor:pointer; }
.pill { font-size:.6rem; font-weight:700; padding:.15rem .45rem; border-radius:999px; }
.pill-free    { background:rgba(100,116,139,.12); color:#94a3b8; }
.pill-basico  { background:rgba(59,130,246,.12);  color:#60a5fa; }
.pill-premium { background:rgba(167,139,250,.12); color:#a78bfa; }
.pill-ativo   { background:rgba(16,185,129,.12);  color:#34d399; }
.pill-inativo { background:rgba(239,68,68,.12);   color:#f87171; }

.action-row { display:flex; gap:.5rem; margin-top:.75rem; flex-wrap:wrap; }
.btn-sm { padding:.4rem .875rem; border-radius:.625rem; font-size:.68rem; font-weight:700; border:none; cursor:pointer; transition:.2s; }
.btn-danger  { background:rgba(239,68,68,.15);   color:#f87171; }
.btn-success { background:rgba(16,185,129,.15);  color:#34d399; }
.btn-info    { background:rgba(59,130,246,.15);  color:#60a5fa; }

/* CONVITE MODAL */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(6px); }
.modal-box { background:#0f172a; border:1px solid rgba(255,255,255,.1); border-radius:1.5rem; padding:1.75rem; width:min(90vw,360px); }
.conv-badge { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; letter-spacing:.2em; color:#a78bfa; background:rgba(167,139,250,.1); border:1px solid rgba(167,139,250,.2); border-radius:1rem; padding:1rem; text-align:center; margin:1rem 0; }

/* TOAST */
#toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px); background:#1e293b; color:#f1f5f9; font-size:.8rem; font-weight:700; padding:.65rem 1.25rem; border-radius:999px; transition:.3s; opacity:0; z-index:999; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.ok   { background:#064e3b; color:#34d399; }
#toast.err  { background:#450a0a; color:#f87171; }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-card">
    <div style="font-size:2.5rem;margin-bottom:.75rem">🔐</div>
    <p class="lock-logo">SaaS Admin</p>
    <p style="font-size:.65rem;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin:.25rem 0 1.75rem">CH Geladas</p>
    <input type="password" id="adminSenha" class="inp" placeholder="Senha master">
    <div id="adminErr" style="font-size:.7rem;color:#f87171;font-weight:700;min-height:1rem;margin-bottom:.75rem"></div>
    <button id="btnLoginAdmin" onclick="loginAdmin(this)" style="width:100%;padding:1rem;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:1rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;text-transform:uppercase;cursor:pointer">
      Entrar
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-title">🔐 SaaS Admin</div>
    <span id="totalBadge" class="badge-total">0 empresas</span>
    <button onclick="logoutAdmin()" style="color:#475569;font-size:.8rem;background:none;border:none;cursor:pointer"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="statTotal" style="color:#f1f5f9">0</div>
      <div class="stat-lbl">Empresas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAtivas" style="color:#34d399">0</div>
      <div class="stat-lbl">Ativas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statPremium" style="color:#a78bfa">0</div>
      <div class="stat-lbl">Premium</div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filtros">
    <button class="filtro-btn on" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="setFiltro('free',this)">Grátis</button>
    <button class="filtro-btn" onclick="setFiltro('basico',this)">Básico</button>
    <button class="filtro-btn" onclick="setFiltro('premium',this)">Premium</button>
    <button class="filtro-btn" onclick="setFiltro('inativo',this)">Inativos</button>
  </div>

  <!-- Lista de empresas -->
  <div id="listaEmpresas" style="padding-bottom:2rem"></div>
</div>

<!-- MODAL CONVITE -->
<div id="modalConvite" class="modal" style="display:none">
  <div class="modal-box">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#a78bfa;margin-bottom:.25rem">🎫 Convite Gerado</div>
    <p style="font-size:.7rem;color:#64748b;margin-bottom:.25rem">Envie este código para o colaborador:</p>
    <div class="conv-badge" id="convBadge">——</div>
    <p style="font-size:.65rem;color:#475569;text-align:center;margin-bottom:1rem">Válido por 24 horas · Role: <span id="convRole"></span></p>
    <button onclick="document.getElementById('modalConvite').style.display='none'"
      style="width:100%;padding:.875rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:.875rem;color:#94a3b8;font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer">
      Fechar
    </button>
  </div>
</div>

<div id="toast"></div>

<script src="core.js"></script>
<script src="./services/saasService.js"></script>
<script>
'use strict';
function _SS() { return window.CH && window.CH.SaasService; }

let _empresas  = [];
let _filtro    = 'todos';
let _expandido = null;

// ── LOGIN ADMIN ───────────────────────────────────────────────────
async function loginAdmin(btn) {
  btn = btn || document.getElementById('btnLoginAdmin');
  const SS  = _SS();
  const err = document.getElementById('adminErr');
  if (!SS) { err.textContent = 'Serviço não carregado.'; return; }
  btn.textContent = 'Verificando…';
  btn.disabled = true;
  try {
    await SS.loginSuperAdmin(document.getElementById('adminSenha').value);
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    carregar();
  } catch(e) {
    err.textContent = e.message;
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

function logoutAdmin() {
  if (!confirm('Sair do painel?')) return;
  _SS() && _SS().logout();
  location.reload();
}

document.getElementById('adminSenha').addEventListener('keydown', e => { if (e.key === 'Enter') loginAdmin(document.getElementById('btnLoginAdmin')); });

// Restaura sessão super admin se já estava logado
window.addEventListener('DOMContentLoaded', () => {
  const SS = _SS();
  if (SS && SS.isSuperAdmin()) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    carregar();
  }
});

// ── CARREGAR EMPRESAS ─────────────────────────────────────────────
async function carregar() {
  try {
    _empresas = await _SS().listarEmpresas();
    renderStats();
    renderLista();
  } catch(e) { toast(e.message, 'err'); }
}

function renderStats() {
  document.getElementById('statTotal').textContent   = _empresas.length;
  document.getElementById('statAtivas').textContent  = _empresas.filter(e => e.ativo).length;
  document.getElementById('statPremium').textContent = _empresas.filter(e => e.plano === 'premium').length;
  document.getElementById('totalBadge').textContent  = _empresas.length + ' empresa' + (_empresas.length !== 1 ? 's' : '');
}

function setFiltro(f, btn) {
  _filtro = f;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderLista();
}

function renderLista() {
  let lista = _empresas;
  if (_filtro !== 'todos') {
    if (_filtro === 'inativo') lista = lista.filter(e => !e.ativo);
    else lista = lista.filter(e => e.plano === _filtro && e.ativo);
  }

  const el = document.getElementById('listaEmpresas');
  if (!lista.length) {
    el.innerHTML = '<p style="text-align:center;color:#475569;padding:2rem;font-size:.8rem">Nenhuma empresa encontrada</p>';
    return;
  }

  const PLANO_CORES = { free:'pill-free', basico:'pill-basico', premium:'pill-premium' };
  const PLANO_NOMES = { free:'Grátis', basico:'Básico', premium:'Premium' };

  el.innerHTML = lista.map((e, i) => {
    const dt = e.criadoEm ? new Date(e.criadoEm).toLocaleDateString('pt-BR') : '—';
    const planoCls = PLANO_CORES[e.plano] || 'pill-free';
    return `
    <div class="empresa-card">
      <div class="empresa-header" onclick="toggleCard('${e.id}')">
        <div>
          <div class="empresa-nome">${e.nome}</div>
          <div class="empresa-id">${e.id}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
          <span class="pill ${planoCls}">${PLANO_NOMES[e.plano]||e.plano}</span>
          <span class="pill ${e.ativo?'pill-ativo':'pill-inativo'}">${e.ativo?'Ativa':'Inativa'}</span>
        </div>
      </div>
      <div id="card-body-${e.id.replace(/[^a-z0-9_]/gi,'_')}" class="empresa-body" style="display:none">
        <div style="font-size:.68rem;color:#64748b;margin-bottom:.625rem">
          📅 Criada em: ${dt}
        </div>

        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.625rem">
          <span style="font-size:.68rem;color:#64748b;font-weight:700">Plano:</span>
          <select class="plano-sel" onchange="mudarPlano('${e.id}', this.value)">
            <option value="free"    ${e.plano==='free'   ?'selected':''}>Grátis</option>
            <option value="basico"  ${e.plano==='basico' ?'selected':''}>Básico</option>
            <option value="premium" ${e.plano==='premium'?'selected':''}>Premium</option>
          </select>
        </div>

        <div class="action-row">
          ${e.ativo
            ? `<button class="btn-sm btn-danger"  onclick="toggleEmpresa('${e.id}',false)"><i class="fas fa-ban mr-1"></i>Desativar</button>`
            : `<button class="btn-sm btn-success" onclick="toggleEmpresa('${e.id}',true)"><i class="fas fa-check mr-1"></i>Ativar</button>`
          }
          <button class="btn-sm btn-info" onclick="gerarConviteAdmin('${e.id}','colaborador')">
            <i class="fas fa-ticket-alt mr-1"></i>Gerar Convite
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(empresaId) {
  const safeId = empresaId.replace(/[^a-z0-9_]/gi, '_');
  const body = document.getElementById('card-body-' + safeId);
  if (!body) return;
  const open = body.style.display !== 'none';
  document.querySelectorAll('[id^="card-body-"]').forEach(b => b.style.display = 'none');
  if (!open) body.style.display = 'block';
}

async function mudarPlano(empresaId, plano) {
  try {
    await _SS().atualizarPlano(empresaId, plano);
    toast('Plano atualizado!', 'ok');
    await carregar();
  } catch(e) { toast(e.message, 'err'); }
}

async function toggleEmpresa(empresaId, ativo) {
  const acao = ativo ? 'ativar' : 'desativar';
  if (!confirm(`Deseja ${acao} esta empresa?`)) return;
  try {
    await _SS().toggleEmpresa(empresaId, ativo);
    toast(`Empresa ${ativo ? 'ativada' : 'desativada'}!`, 'ok');
    await carregar();
  } catch(e) { toast(e.message, 'err'); }
}

async function gerarConviteAdmin(empresaId, role) {
  try {
    const conv = await _SS().gerarConviteAdmin(empresaId, role);
    document.getElementById('convBadge').textContent = conv.codigo;
    document.getElementById('convRole').textContent  = conv.role;
    document.getElementById('modalConvite').style.display = 'flex';
  } catch(e) { toast(e.message, 'err'); }
}

// ── UTILS ─────────────────────────────────────────────────────────
function toast(msg, tipo='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + tipo;
  setTimeout(() => t.className = '', 2500);
}
</script>
</body>
</html>
